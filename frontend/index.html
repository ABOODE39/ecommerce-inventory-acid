<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>نظام إدارة المخزون والطلبات — تسجيل الدخول</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='18' fill='%23F97316'/%3E%3Ctext x='32' y='44' font-size='34' text-anchor='middle'%3E%F0%9F%9B%92%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="login-page">

  <div id="demo-badge" role="status">وضع عرض · DEMO — البيانات تجريبية في المتصفّح · لا حاجة لخادم</div>

  <div class="login-wrapper">
    <div class="login-brand">
      <div class="login-logo">
        <span class="login-emoji" role="img" aria-label="سلّة تسوّق">🛒</span>
      </div>
      <h1 class="login-title">نظام إدارة المخزون والطلبات</h1>
      <p class="login-subtitle">Inventory &amp; Orders Management — DBMS</p>
    </div>

    <div class="card login-card">
      <h2 class="card-heading">تسجيل الدخول</h2>
      <div id="login-error" class="alert alert-error" hidden></div>

      <div id="demo-hint" hidden>
        <strong>حسابات العرض</strong> (كلمة المرور للجميع:
        <code dir="ltr">Ashur@2026</code>)<br>
        <span dir="ltr">admin &bull; manager &bull; staff &bull; customer</span>
      </div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="username" class="form-label">اسم المستخدم</label>
          <input type="text" id="username" class="form-control"
                 placeholder="أدخل اسم المستخدم" autocomplete="username" required />
        </div>
        <div class="form-group">
          <label for="password" class="form-label">كلمة المرور</label>
          <input type="password" id="password" class="form-control"
                 placeholder="أدخل كلمة المرور" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="login-btn">
          <span class="btn-text">دخول</span><span class="btn-spinner">…</span>
        </button>
      </form>
    </div>

    <p class="login-footer">نظام إدارة المخزون والطلبات — نظام إدارة قاعدة البيانات الآمن</p>
  </div>

  <script src="js/demo-data.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    (function () {
      if (window.SHOP_DEMO_MODE) {
        document.getElementById('demo-badge').classList.add('visible');
        document.body.classList.add('has-demo-badge');
        document.getElementById('demo-hint').hidden = false;
      }
      if (localStorage.getItem('shop_token')) location.href = 'dashboard.html';

      document.getElementById('login-form').addEventListener('submit', async function (e) {
        e.preventDefault();
        var btn = document.getElementById('login-btn');
        var btnText = btn.querySelector('.btn-text');
        var errEl = document.getElementById('login-error');
        errEl.hidden = true; btn.disabled = true; btn.classList.add('is-loading');
        if (btnText) btnText.textContent = 'جارٍ الدخول';
        var r = await SHOP_Auth.handleLogin(
          document.getElementById('username').value.trim(),
          document.getElementById('password').value
        );
        if (!r.ok) {
          errEl.textContent = r.message; errEl.hidden = false;
          btn.disabled = false; btn.classList.remove('is-loading');
          if (btnText) btnText.textContent = 'دخول';
        }
      });
    })();
  </script>
</body>
</html>
