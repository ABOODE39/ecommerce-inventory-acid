<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>نظام إدارة المخزون والطلبات — لوحة التحكم</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='18' fill='%23F97316'/%3E%3Ctext x='32' y='44' font-size='34' text-anchor='middle'%3E%F0%9F%9B%92%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div id="demo-badge" role="status">وضع عرض · DEMO — البيانات تجريبية في المتصفّح</div>

  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-emoji" role="img" aria-label="سلّة تسوّق">🛒</span>
        <h1>المتجر الإلكتروني</h1>
        <p>نظام المخزون والطلبات</p>
      </div>
      <nav class="nav" id="nav"></nav>
      <div class="sidebar-footer">
        <button class="btn btn-secondary btn-sm btn-block" id="logout-btn">تسجيل الخروج</button>
      </div>
    </aside>

    <div class="main">
      <header class="topbar">
        <div class="topbar-brand-inline">
          <span class="topbar-emoji" role="img" aria-label="سلّة تسوّق">🛒</span>
          <span class="topbar-shop-name">نظام إدارة المخزون والطلبات</span>
        </div>
        <h2 id="tb-title">لوحة التحكم</h2>
        <div class="user-chip">
          <div class="user-meta">
            <div id="tb-name" class="user-name">—</div>
            <div class="role" id="tb-role">—</div>
          </div>
          <div class="avatar" id="tb-avatar">?</div>
        </div>
      </header>
      <main class="content" id="content"></main>
    </div>
  </div>

  <script src="js/demo-data.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/modules/overview.js"></script>
  <script src="js/modules/products.js"></script>
  <script src="js/modules/orders.js"></script>
  <script src="js/app.js"></script>
  <script>
    if (window.SHOP_DEMO_MODE) {
      document.getElementById('demo-badge').classList.add('visible');
      document.body.classList.add('has-demo-badge');
    }
  </script>
</body>
</html>
