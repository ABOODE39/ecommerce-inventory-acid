# نشر واجهة المتجر (frontend الثابتة) على GitHub Pages.
# الواجهة تعمل في «وضع العرض» داخل المتصفّح ببيانات تجريبية (بلا خادم).
# النظام الكامل مع PostgreSQL يُشغّل محلياً ويُختبَر في ci.yml.
name: Deploy Frontend to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload frontend artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
