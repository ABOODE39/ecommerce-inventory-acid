name: CI — E-commerce Inventory ACID

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Unit + Integration Tests (ACID)
    runs-on: ubuntu-latest

    # ─── PostgreSQL 16 كـ service container ───────────────────────────
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ecommerce
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ecommerce"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install postgresql-client
        run: sudo apt-get install -y --no-install-recommends postgresql-client

      # تطبيق ملفات قاعدة البيانات بالترتيب 01 → 04
      - name: Apply database schema and seed (01 → 04)
        env:
          PGPASSWORD: postgres
        run: |
          for f in database/01_schema.sql \
                   database/02_rbac.sql \
                   database/03_acid_order.sql \
                   database/04_seed.sql; do
            echo "Applying $f ..."
            psql -v ON_ERROR_STOP=1 -h localhost -U postgres -d ecommerce -f "$f"
          done

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run all tests (unit + integration)
        working-directory: backend
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/ecommerce
          JWT_SECRET: ci-test-secret-ecommerce-32chars!!
          JWT_EXPIRES_IN: 2h
          BCRYPT_ROUNDS: "4"
          NODE_ENV: test
        run: npm test
